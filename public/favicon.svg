<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Premium gradient for coding brackets and borders -->
    <linearGradient id="techGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" /> <!-- Emerald 400 -->
      <stop offset="100%" stop-color="#06b6d4" /> <!-- Cyan 500 -->
    </linearGradient>
    <!-- Secondary glowing background gradient -->
    <radialGradient id="glowRad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Outer soft glow -->
  <circle cx="50" cy="50" r="45" fill="url(#glowRad)" />

  <!-- Hexagonal Tech Shield background -->
  <polygon points="50,6 92,30 92,70 50,94 8,70 8,30" fill="#090d10" stroke="url(#techGrad)" stroke-width="5" stroke-linejoin="round" />
  
  <!-- Sleek tech secondary accents -->
  <path d="M 50,6 L 92,30 L 92,50" stroke="#6ee7b7" stroke-width="5" stroke-linecap="round" opacity="0.8" />
  <path d="M 50,94 L 8,70 L 8,50" stroke="#22d3ee" stroke-width="5" stroke-linecap="round" opacity="0.8" />

  <!-- Code brackets & slash for developer identity - optimized for micro-scale legibility -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Center Code Slash (pure white for extreme high-contrast readability at 16x16) -->
    <line x1="57" y1="25" x2="43" y2="75" stroke="#ffffff" stroke-width="9" />
    
    <!-- Code Brackets using the high-tech emerald-to-cyan gradient -->
    <polyline points="32,36 17,50 32,64" stroke="url(#techGrad)" stroke-width="8" />
    <polyline points="68,36 83,50 68,64" stroke="url(#techGrad)" stroke-width="8" />
  </g>
</svg>
